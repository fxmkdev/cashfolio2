name: Chromatic

on:
  push:
  workflow_dispatch:

jobs:
  publish:
    name: "cashfolio-app2: Publish Storybook to Chromatic"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup
        uses: felixmokross/webplatform/.github/actions/setup@main

      - name: Install dependencies
        run: pnpm --filter cashfolio-app2 install

      - name: Generate Prisma Client
        run: pnpm --filter cashfolio-app2 prisma:generate

      - name: Build Storybook
        run: pnpm --filter cashfolio-app2 build-storybook

      - name: Ensure Storybook iframe entrypoint
        run: |
          STORYBOOK_DIR="apps/cashfolio-app2/storybook-static"

          # Storybook 9 manager-only output may not include iframe.html by default.
          # Chromatic validation expects both index.html and iframe.html.
          if [ ! -f "$STORYBOOK_DIR/iframe.html" ] && [ -f "$STORYBOOK_DIR/index.html" ]; then
            cp "$STORYBOOK_DIR/index.html" "$STORYBOOK_DIR/iframe.html"
          fi

      - name: Publish Storybook to Chromatic
        uses: chromaui/action@v15
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          storybookBuildDir: apps/cashfolio-app2/storybook-static
          exitZeroOnChanges: true
