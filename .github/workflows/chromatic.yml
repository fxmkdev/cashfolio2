name: Chromatic

on:
  push:
  workflow_dispatch:

jobs:
  publish:
    name: "cashfolio-app2: Publish Storybook to Chromatic"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup
        # TODO(#104): webplatform setup action still references actions/setup-node@v4.
        uses: felixmokross/webplatform/.github/actions/setup@main

      - name: Install dependencies
        run: pnpm --filter cashfolio-app2 install

      - name: Generate Prisma Client
        run: pnpm --filter cashfolio-app2 prisma:generate

      - name: Build Storybook
        run: pnpm --filter cashfolio-app2 build-storybook

      - name: Publish Storybook to Chromatic
        uses: chromaui/action@v16
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          storybookBuildDir: apps/cashfolio-app2/storybook-static
          exitZeroOnChanges: true
          exitOnceUploaded: true
          autoAcceptChanges: true
