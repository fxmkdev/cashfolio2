name: Build
on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_release:
        description: Force a release even without a !release commit marker
        required: false
        default: false
        type: boolean

env:
  NODE_VERSION: 24
  FLYCTL_VERSION: 0.4.25

jobs:
  version:
    name: "Generate version"
    uses: ./.github/workflows/version.yml
    with:
      force_release: ${{ github.event_name == 'workflow_dispatch' && inputs.force_release }}

  cashfolio-app2-build-push:
    name: "cashfolio-app2: Build and Push"
    runs-on: ubuntu-latest
    needs: [version]
    outputs:
      image: ${{ steps.image-name.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master
        with:
          version: ${{ env.FLYCTL_VERSION }}
      - name: Setup
        uses: ./.github/actions/setup
      - name: Set version on cashfolio-app2
        run: |
          pnpm version ${{ needs.version.outputs.version }} --git-tag-version false
        working-directory: apps/cashfolio-app2
      - name: Get cashfolio-app2 image name
        id: image-name
        run: |
          IMAGE_NAME=${{ vars.FLY_CASHFOLIO_APP_STAGING_APP }}
          IMAGE_TAG=v${{ needs.version.outputs.version_with_sha }}
          {
            echo "image_name=$IMAGE_NAME"
            echo "image_tag=$IMAGE_TAG"
            echo "image=registry.fly.io/$IMAGE_NAME:$IMAGE_TAG"
          } >> "$GITHUB_OUTPUT"
      - name: Build and push cashfolio-app2 Docker image
        run: |
          flyctl deploy \
            --app ${{ steps.image-name.outputs.image_name }} \
            --config apps/cashfolio-app2/fly.build.toml \
            --build-only \
            --image-label ${{ steps.image-name.outputs.image_tag }} \
            --label org.opencontainers.image.version=${{ steps.image-name.outputs.image_tag }} \
            --push \
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  cashfolio-app2-e2e:
    name: "cashfolio-app2: E2E (Shard ${{ matrix.shard_index }}/${{ matrix.shard_total }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard_index: [1, 2]
        shard_total: [2]
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cashfolio
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d cashfolio" --health-interval
          10s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cashfolio?schema=public
      BASE_URL: http://127.0.0.1:4173
      E2E_AUTH_BYPASS: "true"
      E2E_AUTH_EXTERNAL_ID: e2e-user
      E2E_WORKERS: "2"
      E2E_SHARD: ${{ matrix.shard_index }}/${{ matrix.shard_total }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup
        uses: ./.github/actions/setup
      - name: Install dependencies
        run: pnpm --filter cashfolio-app2 install
      - name: Migrate test database
        run: pnpm --filter cashfolio-app2 exec prisma migrate deploy
      - name: Install Playwright browser
        run: |
          pnpm --filter cashfolio-app2 exec playwright install --with-deps chromium
      - name: Run e2e tests
        run: pnpm --filter cashfolio-app2 e2e:ci
      - name: Upload Playwright timing artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cashfolio-app2-playwright-timings-${{ matrix.shard_index }}-of-${{ matrix.shard_total }}
          path: apps/cashfolio-app2/test-results/results.json
          if-no-files-found: ignore
      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: cashfolio-app2-playwright-artifacts-${{ matrix.shard_index }}-of-${{ matrix.shard_total }}
          path: |
            apps/cashfolio-app2/playwright-report
            apps/cashfolio-app2/test-results
          if-no-files-found: ignore

  cashfolio-app2-e2e-required:
    name: "cashfolio-app2: E2E Required"
    runs-on: ubuntu-latest
    needs: [cashfolio-app2-e2e]
    if: ${{ always() }}
    steps:
      - name: Check matrix shard aggregate result
        run: |
          if [ "${{ needs.cashfolio-app2-e2e.result }}" != "success" ]; then
            echo "E2E shards did not all succeed (result=${{ needs.cashfolio-app2-e2e.result }})."
            exit 1
          fi

  cashfolio-app2-unit:
    name: "cashfolio-app2: Unit + Coverage"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup
        uses: ./.github/actions/setup
      - name: Install dependencies
        run: pnpm --filter cashfolio-app2 install
      - name: Generate Prisma Client
        run: pnpm --filter cashfolio-app2 prisma:generate
      - name: Run unit tests with coverage ratchet
        run: pnpm --filter cashfolio-app2 test:unit:coverage:ratchet
      - name: Upload unit coverage artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cashfolio-app2-unit-coverage
          path: apps/cashfolio-app2/coverage
          if-no-files-found: ignore

  cashfolio-app2-typecheck:
    name: "cashfolio-app2: Typecheck"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup
        uses: ./.github/actions/setup
      - name: Install dependencies
        run: pnpm --filter cashfolio-app2 install
      - name: Generate Prisma Client
        run: pnpm --filter cashfolio-app2 prisma:generate
      - name: Run typecheck
        run: pnpm --filter cashfolio-app2 typecheck

  cashfolio-app2-format:
    name: "cashfolio-app2: Format"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup
        uses: ./.github/actions/setup
      - name: Install dependencies
        run: pnpm install
      - name: Run format check
        run: pnpm --filter cashfolio-app2 format

  cashfolio-app2-lint:
    name: "cashfolio-app2: Lint"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup
        uses: ./.github/actions/setup
      - name: Install dependencies
        run: pnpm --filter cashfolio-app2 install
      - name: Run lint
        run: pnpm --filter cashfolio-app2 lint

  cashfolio-app2-storybook-tests:
    name: "cashfolio-app2: Storybook Tests"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup
        uses: ./.github/actions/setup
      - name: Install dependencies
        run: pnpm --filter cashfolio-app2 install
      - name: Generate Prisma Client
        run: pnpm --filter cashfolio-app2 prisma:generate
      - name: Install Playwright browser
        run: |
          pnpm --filter cashfolio-app2 exec playwright install --with-deps chromium
      - name: Build Storybook
        run: pnpm --filter cashfolio-app2 build-storybook
      - name: Run Storybook tests
        run: |
          STORYBOOK_LOG=/tmp/cashfolio-app2-storybook.log
          STORYBOOK_URL=http://127.0.0.1:6006

          python3 -m http.server 6006 \
            --bind 127.0.0.1 \
            --directory apps/cashfolio-app2/storybook-static \
            > "$STORYBOOK_LOG" 2>&1 &
          STORYBOOK_PID=$!

          cleanup() {
            status=$?
            kill "$STORYBOOK_PID" 2>/dev/null || true

            if [ "$status" -ne 0 ]; then
              echo "::group::Storybook server log"
              cat "$STORYBOOK_LOG"
              echo "::endgroup::"
            fi
          }
          trap cleanup EXIT

          for _ in {1..60}; do
            if curl --fail --silent --show-error "$STORYBOOK_URL/iframe.html" >/dev/null; then
              break
            fi

            if ! kill -0 "$STORYBOOK_PID" 2>/dev/null; then
              exit 1
            fi

            sleep 2
          done

          if ! curl --fail --silent --show-error "$STORYBOOK_URL/iframe.html" >/dev/null; then
            exit 1
          fi

          pnpm --filter cashfolio-app2 test-storybook --maxWorkers 1 --testTimeout 30000

  github-actions-lint:
    name: "GitHub Actions: Lint"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup
        uses: ./.github/actions/setup
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run actionlint
        run: pnpm lint:workflows

  cli-typecheck:
    name: "cli: Typecheck"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup
        uses: ./.github/actions/setup
      - name: Install dependencies
        run: pnpm --filter cli install
      - name: Run typecheck in cli
        run: pnpm --filter cli typecheck

  storybook-publish:
    name: "cashfolio-app2: Publish Storybook"
    if: >-
      github.event_name == 'workflow_dispatch' || github.ref ==
      'refs/heads/main' || (github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.fork == false)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    environment:
      name: >-
        ${{ github.event_name == 'pull_request' && 'preview-cashfolio-storybook'
        || 'staging-cashfolio-storybook' }}
      url: ${{ steps.publish-chromatic.outputs.storybookUrl }}
    concurrency:
      group: >-
        storybook-${{ github.event_name == 'pull_request' && format('pr-{0}',
        github.event.pull_request.number) || format('ref-{0}', github.ref) }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup
        uses: ./.github/actions/setup
      - name: Install dependencies
        run: pnpm --filter cashfolio-app2 install
      - name: Generate Prisma Client
        run: pnpm --filter cashfolio-app2 prisma:generate
      - name: Build Storybook
        run: pnpm --filter cashfolio-app2 build-storybook
      - name: Publish Storybook to Chromatic
        id: publish-chromatic
        uses: chromaui/action@v16
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          storybookBuildDir: apps/cashfolio-app2/storybook-static
          exitZeroOnChanges: true
          exitOnceUploaded: true
          autoAcceptChanges: true

  resolve-preview-names:
    name: Resolve preview resource names
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    outputs:
      fly_app: ${{ steps.names.outputs.fly_app }}
      preview_hostname: ${{ steps.names.outputs.preview_hostname }}
      preview_url: ${{ steps.names.outputs.preview_url }}
      neon_branch_name: ${{ steps.names.outputs.neon_branch_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Resolve preview resource names
        id: names
        uses: ./.github/actions/resolve-preview-names
        with:
          pr_number: ${{ github.event.pull_request.number }}
          head_ref: ${{ github.event.pull_request.head.ref }}

  preview-deploy:
    name: Deploy to preview
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.fork == false
    needs:
      - version
      - cashfolio-app2-build-push
      - resolve-preview-names
    permissions:
      contents: read
      deployments: write
    concurrency:
      group: preview-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    uses: ./.github/workflows/deploy-version.yml
    with:
      version_with_sha: ${{ needs.version.outputs.version_with_sha }}
      sha: ${{ needs.version.outputs.sha }}
      environment: preview
      app_environment_name: preview-cashfolio-app
      app_environment_url: ${{ needs.resolve-preview-names.outputs.preview_url }}
      deploy-cashfolio-app2: true
      deploy-cashfolio-redis: false
      high_availability: false
      prepare_preview_environment: true
      cashfolio_app2_image: ${{ needs.cashfolio-app2-build-push.outputs.image }}
      fly_app: ${{ needs.resolve-preview-names.outputs.fly_app }}
      canonical_hostname: ${{ needs.resolve-preview-names.outputs.preview_hostname }}
      base_url: ${{ needs.resolve-preview-names.outputs.preview_url }}
      neon_branch_name: ${{ needs.resolve-preview-names.outputs.neon_branch_name }}
    secrets: inherit

  preview-post:
    name: Publish preview URL on PR
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    needs:
      - resolve-preview-names
      - preview-deploy
    permissions:
      contents: read
      pull-requests: write
      issues: write
    concurrency:
      group: preview-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    env:
      PREVIEW_URL: ${{ needs.resolve-preview-names.outputs.preview_url }}
      FLY_APP: ${{ needs.resolve-preview-names.outputs.fly_app }}
      NEON_BRANCH_NAME: ${{ needs.resolve-preview-names.outputs.neon_branch_name }}
    steps:
      - name: Publish preview URL on PR
        uses: actions/github-script@v8
        with:
          script: |
            const marker = "<!-- cashfolio-app2-dynamic-preview -->";
            const bodyLines = [
              marker,
              "Dynamic preview deployed",
              "",
              `- URL: ${process.env.PREVIEW_URL}`,
              `- Fly app: \`${process.env.FLY_APP}\``,
              `- Neon branch: \`${process.env.NEON_BRANCH_NAME}\``,
              `- Commit: \`${context.sha.slice(0, 7)}\``,
            ];
            const body = bodyLines.join("\n");

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) => {
              return comment.user?.type === "Bot" && comment.body?.includes(marker);
            });

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

  deploy:
    name: Deploy to staging
    if: github.event_name != 'pull_request'
    needs:
      - version
      - cashfolio-app2-build-push
      - cashfolio-app2-unit
      - cashfolio-app2-e2e-required
      - cashfolio-app2-typecheck
      - cashfolio-app2-lint
      - cashfolio-app2-storybook-tests
      - cashfolio-app2-format
      - github-actions-lint
      - cli-typecheck
    uses: ./.github/workflows/deploy-version.yml
    with:
      version_with_sha: ${{ needs.version.outputs.version_with_sha }}
      sha: ${{ needs.version.outputs.sha }}
      environment: staging
      deploy-cashfolio-redis: false
    secrets: inherit

  release:
    name: Release
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'pull_request' && needs.version.outputs.is_new_release
      == 'true'
    needs:
      - deploy
      - version
    concurrency:
      group: release
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - name: Checkout with full history
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup
        uses: ./.github/actions/setup
      - name: Install dependencies
        run: pnpm --workspace-root install --frozen-lockfile
      - name: Publish release
        run: pnpm releaser publish ${{ needs.version.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
