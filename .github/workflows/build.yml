name: Build
on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release:
        description: "Create a release"
        required: false
        default: false
        type: boolean

env:
  NODE_VERSION: 24
  FLYCTL_VERSION: 0.4.25

jobs:
  version:
    name: "Generate version"
    uses: felixmokross/webplatform/.github/workflows/export.version.yml@main
    with:
      release: ${{ inputs.release }}

  cashfolio-app-build-push:
    name: "cashfolio-app: Build and Push"
    runs-on: ubuntu-latest
    needs: [version]
    outputs:
      image: ${{ steps.image-name.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master
        with:
          version: ${{ env.FLYCTL_VERSION }}
      - name: Setup
        uses: felixmokross/webplatform/.github/actions/setup@main
      - name: Set version on cashfolio-app
        run: |
          pnpm version ${{ needs.version.outputs.version }} --git-tag-version false
        working-directory: apps/cashfolio-app
      - name: Get cashfolio-app image name
        id: image-name
        run: |
          IMAGE_NAME=${{ vars.FLY_CASHFOLIO_APP_STAGING_APP }}
          IMAGE_TAG=v${{ needs.version.outputs.version_with_sha }}
          echo "image_name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "image=registry.fly.io/$IMAGE_NAME:$IMAGE_TAG" >> "$GITHUB_OUTPUT"
      - name: Build and push cashfolio-app Docker image
        run: |
          flyctl deploy \
            --app ${{ steps.image-name.outputs.image_name }} \
            --config apps/cashfolio-app/fly.build.toml \
            --build-only \
            --image-label ${{ steps.image-name.outputs.image_tag }} \
            --label org.opencontainers.image.version=${{ steps.image-name.outputs.image_tag }} \
            --push \
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  cashfolio-app-unit-tests:
    name: "cashfolio-app: Unit Tests"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup
        uses: felixmokross/webplatform/.github/actions/setup@main
      - name: Install dependencies
        run: pnpm --filter cashfolio-app --filter cli install
      - name: Generate Prisma Client
        run: pnpm --filter cashfolio-app prisma:generate
      - name: Run unit tests
        run: pnpm --filter cli start test

  cashfolio-app2-e2e:
    name: "cashfolio-app2: E2E"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cashfolio
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d cashfolio"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cashfolio?schema=public
      BASE_URL: http://127.0.0.1:4173
      E2E_AUTH_BYPASS: "true"
      E2E_AUTH_EXTERNAL_ID: e2e-user
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup
        uses: felixmokross/webplatform/.github/actions/setup@main
      - name: Install dependencies
        run: pnpm --filter cashfolio-app2 install
      - name: Generate Prisma Client
        run: pnpm --filter cashfolio-app2 prisma:generate
      - name: Migrate test database
        run: pnpm --filter cashfolio-app2 exec prisma migrate deploy
      - name: Install Playwright browser
        run: pnpm --filter cashfolio-app2 exec playwright install --with-deps chromium
      - name: Run e2e tests
        run: pnpm --filter cashfolio-app2 e2e:ci
      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cashfolio-app2-playwright-artifacts
          path: |
            apps/cashfolio-app2/playwright-report
            apps/cashfolio-app2/test-results
          if-no-files-found: ignore

  cashfolio-app2-typecheck:
    name: "cashfolio-app2: Typecheck"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup
        uses: felixmokross/webplatform/.github/actions/setup@main
      - name: Install dependencies
        run: pnpm --filter cashfolio-app2 install
      - name: Generate Prisma Client
        run: pnpm --filter cashfolio-app2 prisma:generate
      - name: Run typecheck
        run: pnpm --filter cashfolio-app2 typecheck

  cashfolio-app2-format:
    name: "cashfolio-app2: Format"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup
        uses: felixmokross/webplatform/.github/actions/setup@main
      - name: Install dependencies
        run: pnpm --filter cashfolio-app2 install
      - name: Run format check
        run: pnpm --filter cashfolio-app2 format

  cashfolio-redis-build-push:
    name: "cashfolio-redis: Build and Push"
    runs-on: ubuntu-latest
    needs: [version]
    outputs:
      image: ${{ steps.image-name.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master
        with:
          version: ${{ env.FLYCTL_VERSION }}
      - name: Get cashfolio-redis image name
        id: image-name
        run: |
          IMAGE_NAME=${{ vars.FLY_CASHFOLIO_REDIS_STAGING_APP }}
          IMAGE_TAG=v${{ needs.version.outputs.version_with_sha }}
          echo "image_name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "image=registry.fly.io/$IMAGE_NAME:$IMAGE_TAG" >> "$GITHUB_OUTPUT"
      - name: Build and push cashfolio-redis Docker image
        run: |
          flyctl deploy \
            --app ${{ steps.image-name.outputs.image_name }} \
            --config infra/cashfolio-redis/fly.build.toml \
            --build-only \
            --image-label ${{ steps.image-name.outputs.image_tag }} \
            --label org.opencontainers.image.version=${{ steps.image-name.outputs.image_tag }} \
            --push \
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  cli-typecheck:
    name: "cli: Typecheck"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup
        uses: felixmokross/webplatform/.github/actions/setup@main
      - name: Install dependencies
        run: pnpm --filter cli install
      - name: Run typecheck in cli
        run: pnpm --filter cli typecheck

  deploy-preview:
    name: Deploy to preview
    if: github.event_name == 'pull_request'
    needs:
      - version
      - cashfolio-app-build-push
      - cashfolio-redis-build-push
      - cashfolio-app2-e2e
      - cashfolio-app2-typecheck
      - cashfolio-app2-format
    uses: ./.github/workflows/deploy-version.yml
    with:
      version_with_sha: ${{ needs.version.outputs.version_with_sha }}
      sha: ${{ needs.version.outputs.sha }}
      environment: preview
    secrets: inherit

  deploy:
    name: Deploy to staging
    if: github.event_name != 'pull_request'
    needs:
      - version
      - cashfolio-app-unit-tests
      - cashfolio-app-build-push
      - cashfolio-redis-build-push
      - cashfolio-app2-e2e
      - cashfolio-app2-typecheck
      - cashfolio-app2-format
      - cli-typecheck
    uses: ./.github/workflows/deploy-version.yml
    with:
      version_with_sha: ${{ needs.version.outputs.version_with_sha }}
      sha: ${{ needs.version.outputs.sha }}
      environment: staging
    secrets: inherit
