name: Build
on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release:
        description: "Create a release"
        required: false
        default: false
        type: boolean

env:
  NODE_VERSION: 24
  FLYCTL_VERSION: 0.4.25

jobs:
  version:
    name: "Generate version"
    uses: felixmokross/webplatform/.github/workflows/export.version.yml@main
    with:
      release: ${{ inputs.release }}

  cashfolio-app2-build-push:
    name: "cashfolio-app2: Build and Push"
    runs-on: ubuntu-latest
    needs: [version]
    outputs:
      image: ${{ steps.image-name.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master
        with:
          version: ${{ env.FLYCTL_VERSION }}
      - name: Setup
        uses: felixmokross/webplatform/.github/actions/setup@main
      - name: Set version on cashfolio-app2
        run: |
          pnpm version ${{ needs.version.outputs.version }} --git-tag-version false
        working-directory: apps/cashfolio-app2
      - name: Get cashfolio-app2 image name
        id: image-name
        run: |
          IMAGE_NAME=${{ vars.FLY_CASHFOLIO_APP_STAGING_APP }}
          IMAGE_TAG=v${{ needs.version.outputs.version_with_sha }}
          echo "image_name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "image=registry.fly.io/$IMAGE_NAME:$IMAGE_TAG" >> "$GITHUB_OUTPUT"
      - name: Build and push cashfolio-app2 Docker image
        run: |
          flyctl deploy \
            --app ${{ steps.image-name.outputs.image_name }} \
            --config apps/cashfolio-app2/fly.build.toml \
            --build-only \
            --image-label ${{ steps.image-name.outputs.image_tag }} \
            --label org.opencontainers.image.version=${{ steps.image-name.outputs.image_tag }} \
            --push \
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  cashfolio-app2-e2e:
    name: "cashfolio-app2: E2E (Shard ${{ matrix.shard_index }}/${{ matrix.shard_total }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard_index: [1, 2]
        shard_total: [2]
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cashfolio
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d cashfolio" --health-interval
          10s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cashfolio?schema=public
      BASE_URL: http://127.0.0.1:4173
      E2E_AUTH_BYPASS: "true"
      E2E_AUTH_EXTERNAL_ID: e2e-user
      E2E_WORKERS: "1"
      E2E_SHARD: ${{ matrix.shard_index }}/${{ matrix.shard_total }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup
        uses: felixmokross/webplatform/.github/actions/setup@main
      - name: Install dependencies
        run: pnpm --filter cashfolio-app2 install
      - name: Migrate test database
        run: pnpm --filter cashfolio-app2 exec prisma migrate deploy
      - name: Install Playwright browser
        run: |
          pnpm --filter cashfolio-app2 exec playwright install --with-deps chromium
      - name: Run e2e tests
        run: pnpm --filter cashfolio-app2 e2e:ci
      - name: Upload Playwright timing artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cashfolio-app2-playwright-timings-${{ matrix.shard_index }}-of-${{ matrix.shard_total }}
          path: apps/cashfolio-app2/test-results/results.json
          if-no-files-found: ignore
      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: cashfolio-app2-playwright-artifacts-${{ matrix.shard_index }}-of-${{ matrix.shard_total }}
          path: |
            apps/cashfolio-app2/playwright-report
            apps/cashfolio-app2/test-results
          if-no-files-found: ignore

  cashfolio-app2-e2e-required:
    name: "cashfolio-app2: E2E Required"
    runs-on: ubuntu-latest
    needs: [cashfolio-app2-e2e]
    if: ${{ always() }}
    steps:
      - name: Check matrix shard aggregate result
        run: |
          if [ "${{ needs.cashfolio-app2-e2e.result }}" != "success" ]; then
            echo "E2E shards did not all succeed (result=${{ needs.cashfolio-app2-e2e.result }})."
            exit 1
          fi

  cashfolio-app2-unit:
    name: "cashfolio-app2: Unit + Coverage"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup
        uses: felixmokross/webplatform/.github/actions/setup@main
      - name: Install dependencies
        run: pnpm --filter cashfolio-app2 install
      - name: Generate Prisma Client
        run: pnpm --filter cashfolio-app2 prisma:generate
      - name: Run unit tests with coverage ratchet
        run: pnpm --filter cashfolio-app2 test:unit:coverage:ratchet
      - name: Upload unit coverage artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cashfolio-app2-unit-coverage
          path: apps/cashfolio-app2/coverage
          if-no-files-found: ignore

  cashfolio-app2-typecheck:
    name: "cashfolio-app2: Typecheck"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup
        uses: felixmokross/webplatform/.github/actions/setup@main
      - name: Install dependencies
        run: pnpm --filter cashfolio-app2 install
      - name: Generate Prisma Client
        run: pnpm --filter cashfolio-app2 prisma:generate
      - name: Run typecheck
        run: pnpm --filter cashfolio-app2 typecheck

  cashfolio-app2-format:
    name: "cashfolio-app2: Format"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup
        uses: felixmokross/webplatform/.github/actions/setup@main
      - name: Install dependencies
        run: pnpm install
      - name: Run format check
        run: pnpm --filter cashfolio-app2 format

  cli-typecheck:
    name: "cli: Typecheck"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup
        uses: felixmokross/webplatform/.github/actions/setup@main
      - name: Install dependencies
        run: pnpm --filter cli install
      - name: Run typecheck in cli
        run: pnpm --filter cli typecheck

  storybook-publish:
    name: "cashfolio-app2: Publish Storybook"
    if: >-
      github.event_name == 'workflow_dispatch' || github.ref ==
      'refs/heads/main' || (github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.fork == false)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    environment:
      name: >-
        ${{ github.event_name == 'pull_request' && 'preview-cashfolio-storybook'
        || 'staging-cashfolio-storybook' }}
      url: ${{ steps.publish-chromatic.outputs.storybookUrl }}
    concurrency:
      group: >-
        storybook-${{ github.event_name == 'pull_request' && format('pr-{0}',
        github.event.pull_request.number) || format('ref-{0}', github.ref) }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup
        uses: felixmokross/webplatform/.github/actions/setup@main
      - name: Install dependencies
        run: pnpm --filter cashfolio-app2 install
      - name: Generate Prisma Client
        run: pnpm --filter cashfolio-app2 prisma:generate
      - name: Build Storybook
        run: pnpm --filter cashfolio-app2 build-storybook
      - name: Publish Storybook to Chromatic
        id: publish-chromatic
        uses: chromaui/action@v16
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          storybookBuildDir: apps/cashfolio-app2/storybook-static
          exitZeroOnChanges: true
          exitOnceUploaded: true
          autoAcceptChanges: true

  resolve-preview-names:
    name: Resolve preview resource names
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    outputs:
      fly_app: ${{ steps.names.outputs.fly_app }}
      preview_hostname: ${{ steps.names.outputs.preview_hostname }}
      preview_url: ${{ steps.names.outputs.preview_url }}
      neon_branch_name: ${{ steps.names.outputs.neon_branch_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Resolve preview resource names
        id: names
        uses: ./.github/actions/resolve-preview-names
        with:
          pr_number: ${{ github.event.pull_request.number }}
          head_ref: ${{ github.event.pull_request.head.ref }}

  deploy-preview:
    name: Deploy to preview
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    needs:
      - cashfolio-app2-build-push
      - cashfolio-app2-unit
      - cashfolio-app2-typecheck
      - cashfolio-app2-format
      - resolve-preview-names
    permissions:
      contents: read
      deployments: write
      pull-requests: write
      issues: write
    environment:
      name: preview-cashfolio-app
      url: ${{ needs.resolve-preview-names.outputs.preview_url }}
    concurrency:
      group: preview-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    env:
      CASHFOLIO_APP2_IMAGE: ${{ needs.cashfolio-app2-build-push.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Resolve preview resource names
        run: |
          echo "FLY_APP=${{ needs.resolve-preview-names.outputs.fly_app }}" >> "$GITHUB_ENV"
          echo "PREVIEW_HOSTNAME=${{ needs.resolve-preview-names.outputs.preview_hostname }}" >> "$GITHUB_ENV"
          echo "PREVIEW_URL=${{ needs.resolve-preview-names.outputs.preview_url }}" >> "$GITHUB_ENV"
          echo "NEON_BRANCH_NAME=${{ needs.resolve-preview-names.outputs.neon_branch_name }}" >> "$GITHUB_ENV"
      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master
        with:
          version: ${{ env.FLYCTL_VERSION }}
      - name: Set Neon branch expiration date
        run: |
          echo "EXPIRES_AT=$(date -u --date '+14 days' +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"
      - name: Create or reuse Neon branch
        id: neon
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: ${{ env.NEON_BRANCH_NAME }}
          parent_branch: ${{ vars.NEON_PROD_BRANCH_ID }}
          database: ${{ vars.NEON_DATABASE_NAME || 'neondb' }}
          role: ${{ vars.NEON_ROLE_NAME || 'neondb_owner' }}
          api_key: ${{ secrets.NEON_API_KEY }}
          expires_at: ${{ env.EXPIRES_AT }}
      - name: Ensure Fly app exists
        run: |
          set -euo pipefail

          set +e
          FLY_STATUS_OUTPUT="$(flyctl status --app "$FLY_APP" 2>&1)"
          FLY_STATUS_EXIT="$?"
          set -e

          if [ "$FLY_STATUS_EXIT" -eq 0 ]; then
            echo "Reusing Fly app $FLY_APP"
            exit 0
          fi

          if printf '%s\n' "$FLY_STATUS_OUTPUT" | grep -qiE 'could not find app|app not found|unknown app'; then
            echo "Creating Fly app $FLY_APP"
            if [ -n "${FLY_ORG:-}" ]; then
              flyctl apps create "$FLY_APP" --org "$FLY_ORG"
            else
              flyctl apps create "$FLY_APP"
            fi
          else
            echo "flyctl status failed for app $FLY_APP with an unexpected error:"
            printf '%s\n' "$FLY_STATUS_OUTPUT"
            exit "$FLY_STATUS_EXIT"
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_ORG: ${{ vars.FLY_ORG }}
      - name: Generate preview session secret
        id: session-secret
        run: |
          set -euo pipefail

          SESSION_SECRET="$(openssl rand -hex 32)"
          echo "::add-mask::${SESSION_SECRET}"
          echo "value=${SESSION_SECRET}" >> "$GITHUB_OUTPUT"
      - name: Set Fly app secrets
        run: |
          set -euo pipefail

          if [ -z "${CURRENCYLAYER_API_KEY:-}" ]; then
            echo "CURRENCYLAYER_API_KEY secret is required for FX conversion in preview apps."
            exit 1
          fi
          if [ -z "${COINLAYER_API_KEY:-}" ]; then
            echo "COINLAYER_API_KEY secret is required for crypto conversion in preview apps."
            exit 1
          fi
          if [ -z "${MARKETSTACK_API_KEY:-}" ]; then
            echo "MARKETSTACK_API_KEY secret is required for security conversion in preview apps."
            exit 1
          fi
          if [ -z "${STAGING_REDIS_URL:-}" ]; then
            echo "STAGING_REDIS_URL secret is required so preview apps use shared staging Redis cache."
            exit 1
          fi

          flyctl secrets set \
            --app "$FLY_APP" \
            --stage \
            DATABASE_URL="${{ steps.neon.outputs.db_url }}" \
            LOGTO_APP_SECRET="${{ secrets.LOGTO_APP_SECRET }}" \
            SESSION_SECRET="${{ steps.session-secret.outputs.value }}" \
            CURRENCYLAYER_API_KEY="${CURRENCYLAYER_API_KEY}" \
            COINLAYER_API_KEY="${COINLAYER_API_KEY}" \
            MARKETSTACK_API_KEY="${MARKETSTACK_API_KEY}" \
            REDIS_URL="${STAGING_REDIS_URL}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          CURRENCYLAYER_API_KEY: ${{ secrets.CURRENCYLAYER_API_KEY }}
          COINLAYER_API_KEY: ${{ secrets.COINLAYER_API_KEY }}
          MARKETSTACK_API_KEY: ${{ secrets.MARKETSTACK_API_KEY }}
          STAGING_REDIS_URL: ${{ secrets.STAGING_REDIS_URL }}
      - name: Prepare Fly configuration file
        run: |
          envsubst \
            < apps/cashfolio-app2/fly.template.toml \
            > apps/cashfolio-app2/fly.generated.toml
        env:
          FLY_APP: ${{ env.FLY_APP }}
          FLY_PRIMARY_REGION: ${{ vars.FLY_PRIMARY_REGION }}
          FLY_MIN_MACHINES_RUNNING: ${{ vars.FLY_MIN_MACHINES_RUNNING }}
          FLY_MEMORY: ${{ vars.FLY_MEMORY }}
          FLY_CPU_KIND: ${{ vars.FLY_CPU_KIND }}
          FLY_CPUS: ${{ vars.FLY_CPUS }}
          CANONICAL_HOSTNAME: ${{ env.PREVIEW_HOSTNAME }}
          BASE_URL: ${{ env.PREVIEW_URL }}
          LOGTO_ENDPOINT: ${{ vars.LOGTO_ENDPOINT }}
          LOGTO_TENANT_ID: ${{ vars.LOGTO_TENANT_ID }}
          LOGTO_APP_ID: ${{ vars.LOGTO_APP_ID }}
      - name: Log in to Fly registry
        uses: docker/login-action@v4
        with:
          registry: registry.fly.io
          username: x
          password: ${{ secrets.FLY_API_TOKEN }}
      - name: Wait for cashfolio-app2 image in Fly registry
        timeout-minutes: 7
        run: |
          set -euo pipefail

          IMAGE="${CASHFOLIO_APP2_IMAGE}"
          MAX_ATTEMPTS=24
          SLEEP_SECONDS=15
          LAST_ERROR=""

          for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
            ERROR_FILE="$(mktemp)"
            if docker manifest inspect "$IMAGE" > /dev/null 2>"$ERROR_FILE"; then
              rm -f "$ERROR_FILE"
              echo "Image is available: $IMAGE"
              exit 0
            fi

            ERROR_TEXT="$(tr '\n' ' ' < "$ERROR_FILE" | sed -E 's/[[:space:]]+/ /g')"
            rm -f "$ERROR_FILE"
            LAST_ERROR="$ERROR_TEXT"

            if printf '%s' "$ERROR_TEXT" | grep -Eiq '(unauthorized|authentication required|denied|forbidden|insufficient_scope|access denied)'; then
              echo "Registry auth/permission error while checking image: $IMAGE"
              echo "docker manifest inspect error: $ERROR_TEXT"
              exit 1
            fi

            if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
              echo "[$attempt/$MAX_ATTEMPTS] Waiting for image: $IMAGE"
              sleep "$SLEEP_SECONDS"
            fi
          done

          echo "Timed out waiting for image: $IMAGE"
          if [ -n "$LAST_ERROR" ]; then
            echo "Last docker manifest inspect error: $LAST_ERROR"
          fi
          exit 1
      - name: Deploy cashfolio-app2 to dynamic preview
        run: |
          flyctl deploy \
            --config apps/cashfolio-app2/fly.generated.toml \
            --ha=false \
            --image "${CASHFOLIO_APP2_IMAGE}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Wake up deployed app
        uses: ./.github/actions/warm-up-url
        with:
          url: ${{ env.PREVIEW_URL }}
      - name: Publish preview URL on PR
        uses: actions/github-script@v8
        with:
          script: |
            const marker = "<!-- cashfolio-app2-dynamic-preview -->";
            const bodyLines = [
              marker,
              "Dynamic preview deployed",
              "",
              `- URL: ${process.env.PREVIEW_URL}`,
              `- Fly app: \`${process.env.FLY_APP}\``,
              `- Neon branch: \`${process.env.NEON_BRANCH_NAME}\``,
              `- Commit: \`${context.sha.slice(0, 7)}\``,
            ];
            const body = bodyLines.join("\n");

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) => {
              return comment.user?.type === "Bot" && comment.body?.includes(marker);
            });

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
        env:
          PREVIEW_URL: ${{ env.PREVIEW_URL }}
          FLY_APP: ${{ env.FLY_APP }}
          NEON_BRANCH_NAME: ${{ env.NEON_BRANCH_NAME }}

  deploy:
    name: Deploy to staging
    if: github.event_name != 'pull_request'
    needs:
      - version
      - cashfolio-app2-build-push
      - cashfolio-app2-unit
      - cashfolio-app2-e2e-required
      - cashfolio-app2-typecheck
      - cashfolio-app2-format
      - cli-typecheck
    uses: ./.github/workflows/deploy-version.yml
    with:
      version_with_sha: ${{ needs.version.outputs.version_with_sha }}
      sha: ${{ needs.version.outputs.sha }}
      environment: staging
      deploy-cashfolio-redis: false
    secrets: inherit
