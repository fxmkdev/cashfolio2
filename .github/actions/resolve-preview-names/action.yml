name: Resolve preview resource names
description: Compute deterministic preview resource names from PR number and branch ref.
inputs:
  pr_number:
    description: Pull request number
    required: true
  head_ref:
    description: Pull request head ref (branch name)
    required: true
outputs:
  fly_app:
    description: Fly app name for preview deploy
    value: ${{ steps.resolve.outputs.fly_app }}
  fly_app_legacy:
    description: Legacy Fly app name used before branch-tail suffixing
    value: ${{ steps.resolve.outputs.fly_app_legacy }}
  preview_hostname:
    description: Preview hostname
    value: ${{ steps.resolve.outputs.preview_hostname }}
  preview_url:
    description: Preview URL
    value: ${{ steps.resolve.outputs.preview_url }}
  neon_branch_name:
    description: Neon branch name for preview deploy
    value: ${{ steps.resolve.outputs.neon_branch_name }}
  neon_branch_legacy:
    description: Legacy Neon branch name used before branch-tail suffixing
    value: ${{ steps.resolve.outputs.neon_branch_legacy }}
runs:
  using: composite
  steps:
    - name: Resolve preview resource names
      id: resolve
      shell: bash
      run: |
        set -euo pipefail

        PR_NUMBER="${{ inputs.pr_number }}"
        HEAD_REF="${{ inputs.head_ref }}"
        BRANCH_TAIL="${HEAD_REF##*/}"

        BRANCH_TAIL_SLUG="$(printf '%s' "$BRANCH_TAIL" \
          | tr '[:upper:]' '[:lower:]' \
          | sed -E 's/[^a-z0-9-]+/-/g; s/-+/-/g; s/^-+//; s/-+$//')"
        if [ -z "$BRANCH_TAIL_SLUG" ]; then
          BRANCH_TAIL_SLUG="branch"
        fi

        PREFIX="cashfolio-app2-pr-${PR_NUMBER}-"
        MAX_SUFFIX_LEN=$((63 - ${#PREFIX}))
        if [ "$MAX_SUFFIX_LEN" -lt 1 ]; then
          echo "Computed max suffix length is invalid (${MAX_SUFFIX_LEN}) for prefix ${PREFIX}" >&2
          exit 1
        fi

        SUFFIX="$BRANCH_TAIL_SLUG"
        if [ "${#SUFFIX}" -gt "$MAX_SUFFIX_LEN" ]; then
          HASH="$(printf '%s' "$BRANCH_TAIL_SLUG" | sha1sum | cut -c1-6)"
          KEEP_LEN=$((MAX_SUFFIX_LEN - 7))
          if [ "$KEEP_LEN" -lt 1 ]; then
            KEEP_LEN=1
          fi

          TRIMMED_SUFFIX="${BRANCH_TAIL_SLUG:0:$KEEP_LEN}"
          TRIMMED_SUFFIX="$(printf '%s' "$TRIMMED_SUFFIX" | sed -E 's/-+$//')"
          if [ -z "$TRIMMED_SUFFIX" ]; then
            TRIMMED_SUFFIX="b"
          fi

          SUFFIX="${TRIMMED_SUFFIX}-${HASH}"
        fi

        FLY_APP="cashfolio-app2-pr-${PR_NUMBER}-${SUFFIX}"
        PREVIEW_HOSTNAME="${FLY_APP}.fly.dev"
        PREVIEW_URL="https://${PREVIEW_HOSTNAME}/"
        NEON_BRANCH_NAME="pr-${PR_NUMBER}-${SUFFIX}-cashfolio-app2"

        {
          echo "fly_app=${FLY_APP}"
          echo "fly_app_legacy=cashfolio-app2-pr-${PR_NUMBER}"
          echo "preview_hostname=${PREVIEW_HOSTNAME}"
          echo "preview_url=${PREVIEW_URL}"
          echo "neon_branch_name=${NEON_BRANCH_NAME}"
          echo "neon_branch_legacy=pr-${PR_NUMBER}-cashfolio-app2"
        } >> "$GITHUB_OUTPUT"
