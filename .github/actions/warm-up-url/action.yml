name: Warm up URL
description: Request a URL with retries so deployments are warm before completion.
inputs:
  url:
    description: URL to request.
    required: true
runs:
  using: composite
  steps:
    - name: Request warm-up URL
      shell: bash
      run: |
        set -euo pipefail

        WARMUP_URL="${{ inputs.url }}"
        WARMUP_URL="${WARMUP_URL%/}/"

        curl \
          --fail \
          --silent \
          --show-error \
          --location \
          --retry 12 \
          --retry-delay 5 \
          --retry-all-errors \
          --max-time 20 \
          "$WARMUP_URL" \
          > /dev/null

        echo "App warm-up request succeeded: $WARMUP_URL"
